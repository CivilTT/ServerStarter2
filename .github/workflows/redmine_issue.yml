name: Redmien

on:
 issues: 
   types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: Create new Ticket
        run: curl -X POST -H "Content-Type:application/json" -H "X-Redmine-API-Key:${{secrets.REDMINE_API_KEY}}" -d '{"issue":{"project":{"id":2,"name":"クリスマス大型アップデート (v2.3.0)"},"tracker":{"id":1,"name":"バグ"},"status":{"id":1,"name":"新規"},"priority":{"id":2,"name":"通常"}"subject":"sample","description":"# Kusa\r\n\r\n-sample-"}' http://redmine-serverstarter2:3000/issues.json