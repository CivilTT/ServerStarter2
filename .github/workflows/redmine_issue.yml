name: Redmien

on:
 issues: 
   types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      - name: Create new Ticket
        run: curl -X PUT -H "Content-Type:application/json" -H "X-Redmine-API-Key:${{secrets.REDMINE_API_KEY}}" -d '{"issue":{"notes":"Issues [${{github.event.issue.title}}](sample) ${{github.event.action}}"}}' http://redmine-serverstarter2:3000/issues/1.json