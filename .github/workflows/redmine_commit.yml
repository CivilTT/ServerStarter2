name: Ref Commit to Redmine

on: 
  push: 

env:
  # RedmineのURL
  TARGET_URL: http://redmine-serverstarter2:3000
  
  # RedmineのプロジェクトID
  # 現在は v2.3.0 のプロジェクトにIssueを立てる設定となっているため，プロジェクト変更時はここを変更する
  # PROJECT_ID: 2
  
  # ステータスの番号（「作業中」の並び順番号を指定）
  TARGET_STATUS_ID: 2

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Tailescaleは https://zenn.dev/mimi_chan/articles/599841c45b4d49 の記事に従って設定する
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
      
      # pushに含まれるコミットメッセージ一覧を取得
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Get commit messages
        run: |
          commits=$(git log --format=%B ${{ github.event.before }}..${{ github.event.after }})
          echo "$commits" | while read -r commit_message; do
            echo "$commit_message"
          done
      
      # # PRのタイトルで「PR#00 タイトル」のようにしたとき，チケット番号である#00の数値を抽出
      # - name: Parse PR Title
      #   id: parse
      #   run: |
      #     if [[ "${{github.event.pull_request.title}}" =~ PR#([0-9]+) ]]; then
      #       echo "::set-output name=number::${BASH_REMATCH[1]}"
      #     else
      #       echo "::set-output name=number::0"
      #     fi
      # # ステータスを「終了」に進める
      # - name: Send pr info to redmine (pr is closed)
      #   if: steps.parse.outputs.number != 0 && github.event.pull_request.merged == true
      #   run: |
      #     curl -X PUT -H "Content-Type:application/json" -H "X-Redmine-API-Key:${{secrets.REDMINE_API_KEY}}" -d '{"issue":{"status_id":${{env.TARGET_STATUS_ID_MERGED}}}}' ${{env.TARGET_URL}}/issues/${{steps.parse.outputs.number}}.json
      # # ステータスを「却下」に進める
      # - name: Send pr info to redmine (pr is rejected)
      #   if: steps.parse.outputs.number != 0 && github.event.pull_request.merged == false
      #   run: |
      #     curl -X PUT -H "Content-Type:application/json" -H "X-Redmine-API-Key:${{secrets.REDMINE_API_KEY}}" -d '{"issue":{"status_id":${{env.TARGET_STATUS_ID_REJECT}}}}' ${{env.TARGET_URL}}/issues/${{steps.parse.outputs.number}}.json
        
  